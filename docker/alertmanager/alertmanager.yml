global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'job']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      repeat_interval: 1h

receivers:
  ## ─── Default Receiver ──────────────────────────────────────
  - name: 'default'
    webhook_configs:
      - url: 'http://localhost:5001'
        send_resolved: true

  ## ─── Critical Alerts ───────────────────────────────────────
  - name: 'critical'
    webhook_configs:
      - url: 'http://localhost:5001'
        send_resolved: true
    ## Uncomment and configure for Slack:
    ## slack_configs:
    ##   - api_url: 'YOUR_SLACK_WEBHOOK_URL'
    ##     channel: '##alerts'
    ##     send_resolved: true
    ##     title: '{{ template "slack.default.title" . }}'
    ##     text: '{{ template "slack.default.text" . }}'

    ## Uncomment and configure for Email:
    ## email_configs:
    ##   - to: 'your@email.com'
    ##     from: 'alertmanager@your-domain.com'
    ##     smarthost: 'smtp.gmail.com:587'
    ##     auth_username: 'your@email.com'
    ##     auth_password: 'your-password'
    ##     send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'job']
