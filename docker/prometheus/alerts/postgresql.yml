groups:
  - name: postgresql
    rules:
      - alert: PostgreSQLDown
        expr: up{job="postgresql"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          description: "PostgreSQL exporter is down"

      - alert: PostgreSQLHighConnections
        expr: sum(pg_stat_activity_count) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          description: "PostgreSQL has high number of connections (current: {{ $value }})"

      - alert: PostgreSQLDeadlocks
        expr: rate(pg_stat_database_deadlocks[5m]) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          description: "PostgreSQL deadlocks detected (current rate: {{ $value | printf \"%.2f\" }}/s)"

      - alert: PostgreSQLSlowQueries
        expr: rate(pg_stat_activity_max_tx_duration{state="active"}[5m]) > 300
        for: 2m
        labels:
          severity: warning
        annotations:
          description: "PostgreSQL has slow queries running for more than 5 minutes"

      - alert: PostgreSQLHighCacheHitRatio
        expr: rate(pg_stat_database_blks_hit[5m]) / (rate(pg_stat_database_blks_hit[5m]) + rate(pg_stat_database_blks_read[5m])) < 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          description: "PostgreSQL cache hit ratio is below 90% (current: {{ $value | printf \"%.2f\" }})"

      - alert: PostgreSQLReplicationLag
        expr: pg_replication_lag > 300
        for: 2m
        labels:
          severity: warning
        annotations:
          description: "PostgreSQL replication lag is above 300s (current: {{ $value }}s)"
