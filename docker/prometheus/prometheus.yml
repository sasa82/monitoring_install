global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  ## ─── Prometheus Self ─────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  ## ─── ClickHouse ──────────────────────────────────────────────
  - job_name: "clickhouse"
    static_configs:
      - targets: ["clickhouse-exporter:9116"]

  ## ─── Kafka ───────────────────────────────────────────────────
  - job_name: "kafka"
    static_configs:
      - targets: ["kafka-exporter:9308"]

  ## ─── PostgreSQL ──────────────────────────────────────────────
  - job_name: "postgresql"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  ## ─── Redis ───────────────────────────────────────────────────
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  ## ─── Node Exporter ───────────────────────────────────────────
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
