name: monitoring

services:

  ### ─── Prometheus ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ### ─── Grafana ─────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/dashboards/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml
      - ./grafana/dashboards/json:/etc/grafana/provisioning/dashboards/json
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ### ─── Alertmanager ────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9094}:9094"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--cluster.listen-address='
      - '--web.listen-address=:9094'
    healthcheck:
      test: ["CMD", "wget", "-q", "--tries=1", "--spider", "http://localhost:9094/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ### ─── Node Exporter ───────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped

  ### ─── ClickHouse Exporter node1 ───────────────────────────────
  clickhouse-exporter:
    image: f1yegor/clickhouse-exporter:latest
    container_name: clickhouse-exporter
    ports:
      - "${CLICKHOUSE_EXPORTER_PORT:-9116}:9116"
    command:
      - "-scrape_uri=http://${CLICKHOUSE_HOST:-195.201.33.133}:8123/?user=${CLICKHOUSE_USER:-monitoring}"
    restart: unless-stopped

  ### ─── ClickHouse Exporter node2 ───────────────────────────────
  clickhouse-exporter-2:
    image: f1yegor/clickhouse-exporter:latest
    container_name: clickhouse-exporter-2
    ports:
      - "${CLICKHOUSE_EXPORTER_2_PORT:-9117}:9116"
    command:
      - "-scrape_uri=http://${CLICKHOUSE_HOST:-195.201.33.133}:8124/?user=${CLICKHOUSE_USER:-monitoring}"
    restart: unless-stopped

  ### ─── Kafka Exporter ──────────────────────────────────────────
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    ports:
      - "${KAFKA_EXPORTER_PORT:-9308}:9308"
    command:
      - '--kafka.server=${KAFKA_HOST:-195.201.33.133}:9092'
      - '--kafka.server=${KAFKA_HOST:-195.201.33.133}:9095'
    restart: unless-stopped

  ### ─── PostgreSQL Exporter ─────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    ports:
      - "${POSTGRES_EXPORTER_PORT:-9187}:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRESQL_USER:-postgres}:${POSTGRESQL_PASSWORD:-changeme}@${POSTGRESQL_HOST:-195.201.33.133}:5432/${POSTGRESQL_DB:-postgres}?sslmode=disable"
    restart: unless-stopped

  ### ─── Redis Exporter ──────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    ports:
      - "${REDIS_EXPORTER_PORT:-9121}:9121"
    environment:
      REDIS_ADDR: "redis://${REDIS_HOST:-195.201.33.133}:${REDIS_PORT:-6379}"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:

